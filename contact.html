<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – Bhuvaneshwari B</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Bhuvaneshwari<span>.</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="education.html">Education</a></li>
    <li><a href="skills.html">Skills</a></li>

    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light Mode</button>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<main>
  <section class="contact-section">
    <h2 class="section-title">Contact <span>Me!</span></h2>

    <div class="contact-wrapper">

    
      <div class="contact-form">
        <form id="contactForm" onsubmit="sendEmail(event)">
          <div class="form-row">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="Full Name" required/>
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" placeholder="Email Address" required/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="phone">Mobile Number</label>
              <input type="tel" id="phone" placeholder="Mobile Number"/>
            </div>
            <div class="form-group">
              <label for="subject">Email Subject</label>
              <input type="text" id="subject" placeholder="Email Subject" required/>
            </div>
          </div>
          <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" placeholder="Your Message" required></textarea>
          </div>
          <div class="form-submit">
            <button type="submit" class="btn-primary">Send Message</button>
          </div>
        </form>
      </div>

    </div>
  </section>
</main>

<footer>
  <p>© 2026 <span>Bhuvaneshwari B</span>. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("6S3ZxIMmBvL8JT2ff");

function sendEmail(event) {

    event.preventDefault();

    emailjs.send("service_vrtg36t", "template_4j07ylr", {

        fullName: document.getElementById("fullName").value,

        email: document.getElementById("email").value,

        phone: document.getElementById("phone").value,

        subject: document.getElementById("subject").value,

        message: document.getElementById("message").value

    })

    .then(function(response) {

        alert("Message sent successfully!");

        document.getElementById("contactForm").reset();

    }, function(error) {

        alert("Failed to send message");

        console.log(error);

    });

}

</script>

</body>
</html>
